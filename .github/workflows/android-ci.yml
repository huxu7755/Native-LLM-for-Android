name: Android CI

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Select module to build'
        required: true
        default: 'Qwen/v3'
        type: choice
        options:
          - Qwen/v3
          - QwenVL
          - MiniCPM
          - Hunyuan_MT
          - Llama_ONNX
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          sparse-checkout: ''
          fetch-depth: 0

      - name: Set module path
        id: module-path
        run: |
          MODULE="${{ inputs.module || 'Qwen/v3' }}"
          echo "path=$MODULE" >> $GITHUB_OUTPUT

      - name: Prepare module
        run: |
          MODULE="${{ inputs.module || 'Qwen/v3' }}"
          if [ -d "$MODULE" ]; then
            cp -r "$MODULE"/* .
            cp -r "$MODULE"/.* . 2>/dev/null || true
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Gradle repositories for CI
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle << 'EOF'
          allprojects {
              repositories {
                  mavenCentral()
                  google()
                  gradlePluginPortal()
              }
              buildscript {
                  repositories {
                      mavenCentral()
                      google()
                      gradlePluginPortal()
                  }
              }
          }
          settingsEvaluated { settings ->
              settings.pluginManagement {
                  repositories {
                      mavenCentral()
                      google()
                      gradlePluginPortal()
                  }
              }
          }
          EOF

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-${{ steps.module-path.outputs.path }}
          path: app/build/outputs/apk/debug/*.apk
          if [ -d "$MODULE" ]; then
            cp -r "$MODULE"/* .
            cp -r "$MODULE"/.* . 2>/dev/null || true
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-${{ steps.module-path.outputs.path }}
          path: app/build/outputs/apk/debug/*.apk
